<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comentario para mi perrito</title>
  <link rel="stylesheet" href="input.css">
</head>
<body>
  <main class="comentario-container">
    <section class="comentario-carta">
      <h1>Deja un comentario lindo de fondo</h1>
      <p>Esta página es para dedicarle un mensaje bonito a mi perrito. Escribe con cariño y deja tu mejor frase.</p>
      <form class="comentario-form">
        <label for="mensaje">Tu comentario:</label>
        <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe aquí tu comentario para mi perrito..."></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>
</body>
</html>
